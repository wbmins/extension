name: update and release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ehentai extension
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

      - name: Set release version
        run: |
          major=1

          year=$(date +%Y)
          week=$(date +%V)

          # 2026 -> 5, 2027 -> 6, ...
          minor=$((year - 2021))

          version_name="${major}.${minor}.$((10#$week))"

          # 保证 Android versionCode 递增
          version_code=$((year * 10000 + 10#$week))

          echo "VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$version_code" >> "$GITHUB_ENV"

          echo "VERSION_NAME=$version_name"
          echo "VERSION_CODE=$version_code"

      - name: Prepare signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > signingkey.jks

      - name: Update version metadata
        run: |
          sed -i "s/^\([[:space:]]*extVersionName[[:space:]]*=[[:space:]]*\).*/\1'${VERSION_NAME}'/" src/all/ehentai/build.gradle

          sed -i "s/^\([[:space:]]*extVersionCode[[:space:]]*=[[:space:]]*\).*/\1${VERSION_CODE}/" src/all/ehentai/build.gradle

          jq --arg version "$VERSION_NAME" --argjson code "$VERSION_CODE" '
          .[0].version = $version |
          .[0].code = $code |
          .[0].apk = "tachiyomi-all.ehentai-v\($version).apk"
          ' index.json > /tmp/index.json

          mv /tmp/index.json index.json

          jq -c . index.json > index.min.json

      - name: Update etagdb
        run: |
          bash scripts/update-etagdb.sh

      - name: Build ehentai
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :src:all:ehentai:assembleRelease

      - name: Bump version
        run: |
          rm -rf ./apk/*

          for f in src/all/ehentai/build/outputs/apk/release/*-release.apk; do
            mv -f "$f" "apk/$(basename "${f/-release.apk/.apk}")"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "auto build ${VERSION_NAME} [skip ci]"

          git push

      - name: Clean up CI files
        if: always()
        run: rm -f signingkey.jks